name: Fetch Playlist

on:
  schedule:
    - cron: '*/20 * * * *' # हर 20 मिनट में चलेगा
  workflow_dispatch: # मैन्युअल चलाने के लिए

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Playlist using Curl
        run: |
          curl -A "OTT-Navigator/1.7.1.2 (Linux; Android 11)" -L -o this-is-not-you-type.m3u https://la.drmlive.net/tp/playlist

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add this-is-not-you-type.m3u
          git commit -m "Playlist updated every 20 mins" || exit 0
          git push
