<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Singh | Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Syne:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            background-color: #03070c; 
        }

        body {
            margin: 0;
            display: flex;
            place-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- BACKGROUND BLOBS --- */
        .bouncing-blob {
            width: 32vw;
            aspect-ratio: 1;
            border-radius: 50%;
            will-change: transform;
            position: absolute;
            z-index: 1;
        }
        /* सफेद डॉट को यहाँ से हटा दिया गया है */
        .bouncing-blob--blue { background: #4783c7; }
        .bouncing-blob--purple { background: #8c8ff1; }
        .bouncing-blob--pink { background: #e289cd50; }

        .bouncing-blobs-container {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .bouncing-blobs-glass {
            position: absolute;
            inset: 0;
            z-index: 2;
            backdrop-filter: blur(120px);
            -webkit-backdrop-filter: blur(120px);
            background: rgba(0, 0, 0, 0.3); 
        }

        /* --- THE MAIN GLASS CARD --- */
        .main-frame {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 50px 30px;
            width: 85%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px;
            margin-bottom: 20px;
        }

        .dev-name {
            font-family: 'Unbounded', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .telegram-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 25px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            color: #fff;
            text-decoration: none;
            font-family: 'Syne', sans-serif;
            transition: 0.3s;
        }

        .telegram-btn:hover {
            background: #fff;
            color: #000;
        }

        .quote-box {
            margin-top: 40px;
            height: 60px;
            font-family: 'Syne', sans-serif;
            font-style: italic;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>

    <div class="bouncing-blobs-container">
        <div class="bouncing-blobs-glass"></div>
        <div class="bouncing-blobs">
            <div class="bouncing-blob bouncing-blob--blue"></div>
            <div class="bouncing-blob bouncing-blob--blue"></div>
            <div class="bouncing-blob bouncing-blob--purple"></div>
            <div class="bouncing-blob bouncing-blob--purple"></div>
            <div class="bouncing-blob bouncing-blob--pink"></div>
        </div>
    </div>

    <div class="main-frame">
        <img src="https://perelive.pages.dev/ns.png" alt="Rocket Singh" class="profile-img">
        <h1 class="dev-name">Rocket Singh</h1>
        <a href="https://t.me/Lovelyakash41" class="telegram-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18.717-.962 4.084-1.362 5.441-.184.628-.485.836-.732.859-.538.049-.947-.354-1.468-.697-.814-.537-1.274-.871-2.064-1.392-.914-.602-.321-.933.199-1.474.137-.142 2.515-2.304 2.561-2.493.006-.024.011-.114-.042-.161-.053-.047-.132-.031-.189-.018-.08.018-1.363.865-3.844 2.537-.364.249-.693.371-.987.365-.325-.007-.951-.183-1.416-.334-.57-.185-1.023-.283-1.023-.283.426-.264.847-.468 1.263-.613 2.551-1.071 4.253-1.781 5.105-2.128 2.434-.993 2.94-1.165 3.27-1.171.073-.001.236.017.341.102.089.072.113.17.121.242.008.069.011.23-.006.331z"/></svg>
            @Lovelyakash41
        </a>
        <div class="quote-box">
            <p id="quote"></p>
        </div>
    </div>

    <script>
        const MIN_SPEED = 1.5;
        const MAX_SPEED = 2.5;

        class Blob {
            constructor(el) {
                this.el = el;
                this.size = el.offsetWidth;
                this.x = Math.random() * (window.innerWidth - this.size);
                this.y = Math.random() * (window.innerHeight - this.size);
                this.vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * (MAX_SPEED - MIN_SPEED) + MIN_SPEED);
                this.vy = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * (MAX_SPEED - MIN_SPEED) + MIN_SPEED);
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x >= window.innerWidth - this.size || this.x <= 0) this.vx *= -1;
                if (this.y >= window.innerHeight - this.size || this.y <= 0) this.vy *= -1;
                this.el.style.transform = `translate(${this.x}px, ${this.y}px)`;
            }
        }

        const blobs = Array.from(document.querySelectorAll('.bouncing-blob')).map(el => new Blob(el));
        function animate() {
            blobs.forEach(b => b.update());
            requestAnimationFrame(animate);
        }
        animate();

        const quotes = [
            "“I built for a world that did not yet exist.”",
            "“Being misunderstood is the price of thinking ahead.”",
            "“Silence built my genius.”",
            "“Future was my only competition.”",
            "“I spoke in ideas the world had not yet learned to hear.”"
        ];
        let qIdx = 0;
        function nextQuote() {
            const q = document.getElementById('quote');
            q.style.opacity = 0;
            setTimeout(() => {
                q.innerText = quotes[qIdx];
                q.style.opacity = 1;
                qIdx = (qIdx + 1) % quotes.length;
            }, 800);
        }
        setInterval(nextQuote, 4000);
        nextQuote();
    </script>
</body>
</html>
