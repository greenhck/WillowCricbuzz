<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A ONE FAST FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .food-card { background: #0d0d0d; border: 1px solid #1a1a1a; transition: 0.3s; }
        .food-card:hover { border-color: #ff4d00; }
        .qty-btn { background: #1a1a1a; border: 1px solid #333; transition: 0.2s; }
        .qty-btn:hover { background: #ff4d00; color: #fff; }
        
        /* Floating View Cart Button */
        .floating-cart { 
            background: #ff4d00; 
            box-shadow: 0 10px 30px rgba(255, 77, 0, 0.4); 
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Unit Badge on Image */
        .unit-badge {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .strike { text-decoration: line-through; color: #444; }
        .input-field { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 12px; width: 100%; font-size: 14px; outline: none; }
        .input-field:focus { border-color: #ff4d00; }
        .cart-count-badge { background: white; color: #ff4d00; border-radius: 6px; padding: 2px 6px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body class="pb-28">

    <header class="py-8 px-6 text-center">
        <h1 class="text-3xl md:text-5xl font-800 tracking-tighter italic">A ONE<span class="text-orange-600">.</span></h1>
        <p class="text-[9px] uppercase tracking-[0.4em] text-orange-500 font-bold mt-1">Elite Fast Food</p>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 px-3" id="menu-grid"></div>

    <button id="view-cart-btn" onclick="toggleCart()" class="fixed bottom-6 left-1/2 -translate-x-1/2 floating-cart px-5 py-4 rounded-2xl z-50 hidden flex items-center justify-between min-w-[280px] transition-all active:scale-95">
        <div class="flex items-center gap-2">
            <span class="cart-count-badge" id="cart-qty">0</span>
            <span class="text-[11px] font-900 tracking-widest uppercase">View Cart</span>
        </div>
        <span id="cart-total-nav" class="font-800 text-sm border-l border-white/20 pl-4">₹0</span>
    </button>

    <div id="cart-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm overflow-y-auto">
        <div class="w-full max-w-md bg-[#0d0d0d] border border-white/10 rounded-3xl p-6 relative my-auto">
            <button onclick="toggleCart()" class="absolute top-5 right-5 text-gray-500">✕</button>
            <h2 class="text-2xl font-bold mb-6 italic tracking-tight">Checkout</h2>
            
            <div id="cart-items" class="max-h-40 overflow-y-auto mb-6 space-y-2 pr-2"></div>

            <div class="space-y-4 mb-6">
                <input type="text" id="cust-name" placeholder="Full Name" class="input-field">
                <input type="tel" id="cust-phone" placeholder="Mobile Number" class="input-field">
                <textarea id="cust-address" placeholder="Delivery Address" class="input-field h-20"></textarea>
                <input type="text" id="cust-notes" placeholder="Notes (optional)" class="input-field">
            </div>

            <div class="border-t border-white/5 pt-4 space-y-1 text-sm mb-6">
                <div class="flex justify-between text-gray-500"><span>Items Total</span><span id="modal-subtotal">₹0</span></div>
                <div class="flex justify-between text-gray-500"><span>Delivery</span><span id="modal-delivery">₹20</span></div>
                <div class="flex justify-between text-xl font-bold text-orange-500 pt-2 border-t border-white/5 mt-2"><span>Payable Amount</span><span id="modal-total">₹0</span></div>
            </div>

            <button onclick="checkout()" class="w-full bg-white text-black py-4 rounded-xl font-bold text-sm tracking-widest hover:bg-orange-600 hover:text-white transition-all uppercase">
                Confirm Order
            </button>
        </div>
    </div>

    <footer class="mt-12 py-4 border-t border-white/5 text-center">
        <a href="https://t.me/lovelyakash41" target="_blank" class="flex items-center justify-center gap-2 text-[9px] tracking-[0.2em] uppercase font-bold text-gray-600 hover:text-orange-500 transition">
            <i class="fab fa-telegram-plane text-xs"></i>
            Hosted by @lovelyakash41
        </a>
    </footer>

    <script>
        const menu = [
            { id: 1, name: "Samosa", price: 15, unit: "pc", img: "https://www.awesomecuisine.com/wp-content/uploads/2014/11/vegetable-samosa.jpg" },
            { id: 2, name: "Bread Pakora", price: 15, unit: "pc", img: "https://i.ytimg.com/vi/DXfuGuD8D9o/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLCDdwld9OCDs-D9RbhPxcFJPW2dCA" },
            { id: 3, name: "Mix Pakora", price: 200, unit: "kg", img: "https://sukhis.com/app/uploads/2013/03/image1.jpg" },
            { id: 4, name: "Veg Momos", price: 50, unit: "15pc", img: "https://dcprovide.com/wp-content/uploads/2023/04/2-10-2.jpg.webp" },
            { id: 5, name: "Aloo Finger", price: 50, unit: "plate", img: "https://m.media-amazon.com/images/I/71VfAESa6iL.jpg" },
            { id: 6, name: "Dahi Bhalla", price: 35, unit: "plate", img: "https://cdn1.foodviva.com/static-content/food-images/snacks-recipes/dahi-vada-dahi-bhalla/dahi-vada-dahi-bhalla.jpg" },
            { id: 7, name: "Golgappe", price: 40, unit: "12pc", img: "https://i0.wp.com/parentingbyanshu.com/wp-content/uploads/2023/07/group-bombay-chat-food-includes-golgappa.jpg?fit=1000%2C667&ssl=1" },
            { id: 8, name: "Burger", price: 30, unit: "pc", img: "https://res.cloudinary.com/hellochef/image/upload/c_fit/q_auto/dpr_auto/gcaobzdeb2psu5fe5amx?_a=E" },
            { id: 9, name: "Veg Sandwich", price: 30, unit: "pc", img: "https://i.ytimg.com/vi/7_rS8UgmHag/maxresdefault.jpg" },
            { id: 10, name: "Spring Roll", price: 50, unit: "2pc", img: "https://www.chefkunalkapur.com/wp-content/uploads/2021/05/Veg-spring-rolls-scaled.jpg?v=1620580103" },
            { id: 11, name: "Bhel Puri", price: 50, unit: "plate", img: "https://yatrirailways.com/bl-content/uploads/pages/2e3b55e62fdf6db160846828d9d0178e/bhelpuri.jpg" },
            { id: 12, name: "Aloo Tikki", price: 35, unit: "plate", img: "https://www.mymasalabox.in/wp-content/uploads/2021/01/AluTikki2-500x500.jpg" },
            { id: 13, name: "ChowMein", price: 50, unit: "plate", img: "https://images.getrecipekit.com/20240207015214-andy-20cooks-20-20beef-20chow-20mein.jpg?aspect_ratio=4:3&quality=90&" }
        ];

        let cart = {};

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = menu.map(item => {
                const q = cart[item.id] || 0;
                return `
                <div class="food-card rounded-2xl overflow-hidden p-2.5 flex flex-col relative">
                    <div class="relative mb-2">
                        <img src="${item.img}" class="w-full h-28 md:h-36 object-cover rounded-xl" alt="${item.name}">
                        <div class="absolute top-2 right-2 unit-badge">Per ${item.unit}</div>
                    </div>
                    <div class="flex justify-between items-start mb-0.5">
                        <h3 class="text-[11px] md:text-sm font-bold truncate pr-1">${item.name}</h3>
                        <span class="text-orange-500 font-bold text-[11px]">₹${item.price}</span>
                    </div>
                    <div class="mt-auto pt-2">
                        ${q > 0 ? `
                            <div class="flex items-center justify-between bg-white/5 rounded-lg p-0.5 border border-white/5">
                                <button onclick="updateQty(${item.id}, -1)" class="qty-btn w-6 h-6 rounded font-bold text-[10px]">-</button>
                                <span class="font-bold text-[10px]">${q}</span>
                                <button onclick="updateQty(${item.id}, 1)" class="qty-btn w-6 h-6 rounded font-bold text-[10px]">+</button>
                            </div>
                        ` : `
                            <button onclick="updateQty(${item.id}, 1)" class="w-full bg-white text-black py-1.5 rounded-lg text-[8px] font-bold tracking-widest uppercase hover:bg-orange-500 hover:text-white transition">Add to Cart</button>
                        `}
                    </div>
                </div>`;
            }).join('');
        }

        function updateQty(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if(cart[id] <= 0) delete cart[id];
            renderMenu();
            
            let totalItems = 0;
            let subtotal = 0;
            for(let key in cart) {
                totalItems += cart[key];
                subtotal += cart[key] * menu.find(m => m.id == key).price;
            }

            document.getElementById('cart-qty').innerText = totalItems;
            document.getElementById('cart-total-nav').innerText = `₹${subtotal}`;
            document.getElementById('view-cart-btn').style.display = totalItems > 0 ? 'flex' : 'none';
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); if(!document.getElementById('cart-modal').classList.contains('hidden')) renderCartItems(); }

        function renderCartItems() {
            const list = document.getElementById('cart-items');
            let subtotal = 0; let html = "";
            for(let id in cart) {
                const item = menu.find(m => m.id == id);
                subtotal += item.price * cart[id];
                html += `<div class="flex justify-between text-[11px] bg-white/5 p-2 rounded-lg"><span>${item.name} x${cart[id]}</span><span>₹${item.price * cart[id]}</span></div>`;
            }
            list.innerHTML = html;
            const delivery = subtotal >= 150 ? 0 : 20;
            document.getElementById('modal-subtotal').innerText = `₹${subtotal}`;
            document.getElementById('modal-delivery').innerHTML = delivery === 0 ? `<span class="strike">₹20</span> FREE` : `₹20`;
            document.getElementById('modal-total').innerText = `₹${subtotal + delivery}`;
        }

        function checkout() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const addr = document.getElementById('cust-address').value;
            const notes = document.getElementById('cust-notes').value || "N/A";

            if(!name || !phone || !addr) { alert("Please enter Name, Mobile and Address!"); return; }

            let subtotal = 0;
            let msg = "⬛ *ORDER: A-ONE FAST FOOD* ⬛%0A";
            msg += `👤 *Name:* ${name}%0A📞 *Ph:* ${phone}%0A📍 *Addr:* ${addr}%0A━━━━━━━━━━━━━━━━━━%0A`;
            for(let id in cart) {
                const item = menu.find(m => m.id == id);
                msg += `👉 ${item.name} (x${cart[id]}) = ₹${item.price * cart[id]}%0A`;
                subtotal += item.price * cart[id];
            }
            const fee = subtotal >= 150 ? 0 : 20;
            msg += `━━━━━━━━━━━━━━━━━━%0A🔥 *Total Payable: ₹${subtotal + fee}*`;
            window.open(`https://wa.me/919780090217?text=${msg}`, '_blank');
        }
        renderMenu();
    </script>
</body>
</html>
