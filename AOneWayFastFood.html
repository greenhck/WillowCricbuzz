<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A ONE FAST FOOD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            scroll-behavior: smooth;
        }

        .food-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .food-card:hover {
            border-color: #ff4d00;
            transform: translateY(-8px);
        }

        .qty-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            transition: all 0.2s ease;
        }

        .qty-btn:hover {
            background: #ff4d00;
            border-color: #ff4d00;
        }

        .floating-cart {
            background: #ff4d00;
            box-shadow: 0 10px 30px rgba(255, 77, 0, 0.4);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }

        .strike { text-decoration: line-through; opacity: 0.5; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">

    <header class="py-16 px-6 text-center">
        <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-2 italic">A ONE<span class="text-orange-600">.</span></h1>
        <div class="inline-block px-4 py-1 border border-orange-600/30 rounded-full text-[10px] tracking-[0.3em] uppercase text-orange-500 font-bold">
            Premium Fast Food
        </div>
    </header>

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 p-6" id="menu-grid">
        </div>

    <button id="view-cart-btn" onclick="toggleCart()" class="fixed bottom-10 left-1/2 -translate-x-1/2 floating-cart px-10 py-5 rounded-2xl font-bold text-sm tracking-widest z-50 hidden border border-white/20">
        VIEW CART (<span id="cart-qty">0</span>)
    </button>

    <div id="cart-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="w-full max-w-lg bg-[#0a0a0a] border border-white/10 rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="toggleCart()" class="absolute top-8 right-8 text-gray-500 hover:text-white transition">✕</button>
            <h2 class="text-3xl font-bold mb-8 italic">Your Order</h2>
            
            <div id="cart-items" class="max-h-64 overflow-y-auto mb-8 space-y-4 pr-2">
                </div>

            <div class="border-t border-white/5 pt-6 space-y-3">
                <div class="flex justify-between text-gray-400 font-medium">
                    <span>Subtotal</span>
                    <span id="modal-subtotal">₹0</span>
                </div>
                <div class="flex justify-between text-gray-400 font-medium">
                    <span>Delivery</span>
                    <span id="modal-delivery">₹20</span>
                </div>
                <div class="flex justify-between text-3xl font-bold text-orange-500 pt-2">
                    <span>Total</span>
                    <span id="modal-total">₹0</span>
                </div>
            </div>

            <button onclick="checkout()" class="w-full bg-white text-black py-5 rounded-2xl mt-8 font-bold text-lg hover:bg-orange-600 hover:text-white transition-all transform active:scale-95">
                ORDER ON WHATSAPP
            </button>
        </div>
    </div>

    <footer class="mt-20 py-12 border-t border-white/5 text-center">
        <a href="https://t.me/lovelyakash41" target="_blank" class="text-gray-700 hover:text-orange-500 transition text-[10px] tracking-[0.4em] uppercase font-bold">
            Created & Hosted by @lovelyakash41
        </a>
    </footer>

    <script>
        const menu = [
            { id: 1, name: "Samosa", price: 15, unit: "pc", img: "https://images.unsplash.com/photo-1601050690597-df056fb01793?w=500" },
            { id: 2, name: "Bread Pakora", price: 15, unit: "pc", img: "https://images.unsplash.com/photo-1626132646529-500334846074?w=500" },
            { id: 3, name: "Mix Pakora", price: 200, unit: "kg", img: "https://images.unsplash.com/photo-1606491956689-2ea866880c84?w=500" },
            { id: 4, name: "Veg Momos", price: 50, unit: "15pc", img: "https://images.unsplash.com/photo-1625220194771-7eb5421971b2?w=500" },
            { id: 5, name: "Aloo Finger", price: 50, unit: "plate", img: "https://images.unsplash.com/photo-1518013046774-42531b70bc93?w=500" },
            { id: 6, name: "Dahi Bhalla", price: 35, unit: "plate", img: "https://images.unsplash.com/photo-1626132646529-500334846074?w=500" },
            { id: 7, name: "Golgappe", price: 40, unit: "12pc", img: "https://images.unsplash.com/photo-1589112852652-32583844fa0e?w=500" },
            { id: 8, name: "Burger", price: 30, unit: "pc", img: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500" },
            { id: 9, name: "Veg Sandwich", price: 30, unit: "pc", img: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=500" },
            { id: 10, name: "Spring Roll", price: 50, unit: "2pc", img: "https://images.unsplash.com/photo-1542826045-8120302b186b?w=500" },
            { id: 11, name: "Bhel Puri Chat", price: 50, unit: "plate", img: "https://images.unsplash.com/photo-1606491956689-2ea866880c84?w=500" },
            { id: 12, name: "Aloo Tikki", price: 35, unit: "plate", img: "https://images.unsplash.com/photo-1626132646529-500334846074?w=500" },
            { id: 13, name: "ChowMein", price: 50, unit: "plate", img: "https://images.unsplash.com/photo-1585032226651-759b368d7246?w=500" }
        ];

        let cart = {};

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = menu.map(item => {
                const q = cart[item.id] || 0;
                return `
                <div class="food-card rounded-[2rem] overflow-hidden p-5">
                    <img src="${item.img}" class="w-full h-52 object-cover rounded-2xl mb-5 grayscale hover:grayscale-0 transition duration-700" alt="${item.name}">
                    <div class="flex justify-between items-center mb-1">
                        <h3 class="text-xl font-bold">${item.name}</h3>
                        <span class="text-orange-500 font-bold text-xl">₹${item.price}</span>
                    </div>
                    <p class="text-gray-600 text-[10px] uppercase tracking-widest mb-6 font-bold">${item.unit}</p>
                    
                    <div id="btn-container-${item.id}">
                        ${q > 0 ? `
                            <div class="flex items-center justify-between bg-white/5 rounded-xl p-1 border border-white/10">
                                <button onclick="updateQty(${item.id}, -1)" class="qty-btn w-10 h-10 rounded-lg font-bold">-</button>
                                <span class="font-bold text-lg">${q}</span>
                                <button onclick="updateQty(${item.id}, 1)" class="qty-btn w-10 h-10 rounded-lg font-bold">+</button>
                            </div>
                        ` : `
                            <button onclick="updateQty(${item.id}, 1)" class="w-full bg-white text-black py-3 rounded-xl text-[10px] font-900 tracking-widest hover:bg-orange-600 hover:text-white transition uppercase">
                                Add To Cart
                            </button>
                        `}
                    </div>
                </div>
            `}).join('');
        }

        function updateQty(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if(cart[id] <= 0) delete cart[id];
            renderMenu();
            updateFloatingBtn();
        }

        function updateFloatingBtn() {
            const qty = Object.values(cart).reduce((a, b) => a + b, 0);
            const btn = document.getElementById('view-cart-btn');
            document.getElementById('cart-qty').innerText = qty;
            qty > 0 ? btn.classList.remove('hidden') : btn.classList.add('hidden');
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) renderCartItems();
        }

        function renderCartItems() {
            const list = document.getElementById('cart-items');
            let subtotal = 0;
            let html = "";
            
            for(let id in cart) {
                const item = menu.find(m => m.id == id);
                subtotal += item.price * cart[id];
                html += `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5">
                        <div>
                            <p class="font-bold text-lg">${item.name}</p>
                            <p class="text-xs text-gray-500 tracking-widest uppercase">Qty: ${cart[id]}</p>
                        </div>
                        <p class="font-bold text-orange-500">₹${item.price * cart[id]}</p>
                    </div>
                `;
            }
            list.innerHTML = html || "<p class='text-center text-gray-600 py-10'>Your cart is waiting for some delicious food...</p>";
            
            const delivery = subtotal >= 150 ? 0 : 20;
            document.getElementById('modal-subtotal').innerText = `₹${subtotal}`;
            document.getElementById('modal-delivery').innerHTML = delivery === 0 ? `<span class="strike text-gray-700">₹20</span> <span class="text-green-500 text-xs ml-1">FREE</span>` : `₹20`;
            document.getElementById('modal-total').innerText = `₹${subtotal + delivery}`;
        }

        function checkout() {
            let subtotal = 0;
            let msg = "⬛ *NEW ORDER: A-ONE FAST FOOD* ⬛%0A━━━━━━━━━━━━━━━━━━%0A";
            for(let id in cart) {
                const item = menu.find(m => m.id == id);
                msg += `👉 *${item.name}* (x${cart[id]}) = ₹${item.price * cart[id]}%0A`;
                subtotal += item.price * cart[id];
            }
            const fee = subtotal >= 150 ? 0 : 20;
            msg += `━━━━━━━━━━━━━━━━━━%0A💰 Subtotal: ₹${subtotal}%0A🚚 Delivery: ${fee === 0 ? "FREE" : "₹20"}%0A🔥 *Total Bill: ₹${subtotal + fee}*%0A━━━━━━━━━━━━━━━━━━%0A🏠 Address: [Please Write Here]`;
            window.open(`https://wa.me/919780090217?text=${msg}`, '_blank');
        }

        renderMenu();
    </script>
</body>
</html>
